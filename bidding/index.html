<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>招投标雷达｜EXHIBITION RADAR</title>
  <meta name="description" content="展陈、布展、博物馆、纪念馆、数字展厅和文旅项目招投标雷达。">
  <link rel="stylesheet" href="/assets/site.css?v=20260714-bid-radar">
  <style>
    .bid-hero{padding:34px 0 18px}.bid-hero h1{font-size:clamp(36px,5.5vw,68px);line-height:1.02;margin:0 0 12px}.bid-hero p{font-size:18px;color:var(--muted);max-width:820px;margin:0}.subline{margin-top:12px;color:var(--muted);font-size:13px}.filterbar{position:sticky;top:66px;z-index:9;background:rgba(246,247,242,.94);backdrop-filter:blur(12px);border-block:1px solid var(--line);padding:12px 0}.chiprow{display:flex;gap:8px;flex-wrap:wrap}.chipbtn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;font-size:13px;color:var(--muted);cursor:pointer}.chipbtn.active{background:var(--green);border-color:var(--green);color:#fff}.lead-list{display:grid;gap:12px}.lead-card{border:1px solid var(--line);background:#fff;border-radius:8px;padding:16px;display:grid;grid-template-columns:minmax(0,1fr) 190px;gap:16px}.lead-card h3{font-size:20px;line-height:1.25;margin:0 0 8px}.lead-card p{margin:0;color:var(--muted);font-size:14px}.attention{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fbfcf9}.attention b{display:block;font-size:16px;margin-bottom:6px}.kv2{display:grid;grid-template-columns:92px 1fr;gap:6px 10px;margin:12px 0;font-size:13px}.kv2 b{color:var(--ink)}.kv2 span{color:var(--muted)}.small-actions{display:flex;gap:7px;flex-wrap:wrap}.smallbtn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:7px 9px;font-size:12px;color:var(--ink);cursor:pointer}.smallbtn.primary{background:var(--green);border-color:var(--green);color:#fff}.source-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.source-card2{border:1px solid var(--line);background:#fff;border-radius:8px;padding:12px}.source-card2 h3{font-size:16px;margin:0 0 6px}.source-card2 p{font-size:13px;color:var(--muted);margin:0 0 10px}.empty{border:1px solid var(--line);background:#fff;border-radius:8px;padding:18px;color:var(--muted)}@media(max-width:900px){.lead-card{grid-template-columns:1fr}.source-grid{grid-template-columns:1fr}}@media(max-width:720px){.filterbar{position:relative;top:auto}.bid-hero h1{font-size:40px}}
  </style>
</head>
<body>
  <header class="top"><div class="shell nav"><a class="brand" href="/"><span class="mark">ER</span><span>EXHIBITION RADAR</span></a><nav class="navlinks"><a href="/intelligence/">行业情报</a><a class="active" href="/bidding/">招投标雷达</a><a href="/cases/">案例研究</a><a href="/resources/">灵感与AI工具</a><a href="/my/">我的</a></nav></div></header>
  <main>
    <section class="shell bid-hero">
      <p class="eyebrow">BIDDING RADAR</p>
      <h1>最近有什么项目机会？</h1>
      <p>监测展陈、陈列布展、博物馆、纪念馆、数字展厅、多媒体互动和文旅项目。先判断值不值得看，再进公告原文。</p>
      <div class="subline" id="metaLine">已加载本地兜底线索，正在同步最新公告数据…</div>
    </section>

    <section class="filterbar"><div class="shell"><div id="chips" class="chiprow"></div></div></section>

    <section class="shell section">
      <div class="section-head"><div><h2>项目线索</h2><p id="countText">正在显示兜底内容。</p></div><input id="q" class="search" placeholder="搜索：纪念馆、展陈、数字展厅、浙江…" style="max-width:360px"></div>
      <div id="list" class="lead-list"></div>
    </section>

    <section class="shell section">
      <div class="section-head"><div><h2>关键词监测</h2><p>点击关键词快速筛选。</p></div></div>
      <div id="keywords" class="chiprow"></div>
    </section>

    <section class="shell section">
      <div class="section-head"><div><h2>官方来源</h2><p>金额、截止时间和附件以原公告为准。</p></div></div>
      <div id="sources" class="source-grid"></div>
    </section>
  </main>
  <footer class="footer"><div class="shell">EXHIBITION RADAR · 数据文件：/data/bidding.json · 个人本地状态：收藏 / 稍后阅读 / 已读 / 隐藏</div></footer>
  <script src="/assets/personal.js?v=20260714"></script>
  <script>
    const fallback={lastVerifiedAt:'2026-07-14',sources:[{name:'中国政府采购网',type:'政府采购',officialUrl:'https://www.ccgp.gov.cn/',use:'中央与地方政府采购公告'}],keywords:['展陈','陈列布展','博物馆','纪念馆','数字展厅','多媒体互动','文旅夜游'],items:[
      {id:'fb-houchang',title:'猴场会议纪念馆展陈提升项目公开招标公告',category:'纪念馆',region:'贵州黔南',buyer:'中共黔南州委宣传部（标题提取，需原文核验）',noticeType:'公开招标公告',budget:'以公告原文为准',deadline:'以公告原文为准',sourceName:'中国政府采购网',sourceUrl:'http://www.ccgp.gov.cn/cggg/dfgg/gkzb/202607/t20260710_26909768.htm',publishedAt:'2026-07-10T07:00:43.783Z',keywordsMatched:['纪念馆','展陈','提升'],attentionLevel:'重点关注',attentionReason:'纪念馆展陈提升与内容策划、空间叙事、多媒体展项高度相关。',summary:'真实公告线索，预算和资质要求需进入原文核验。',status:'needs_verification'},
      {id:'fb-moganshan',title:'莫干山别墅群545号贝勒别墅展陈提升工程中标(成交)结果公告',category:'展陈提升',region:'浙江',buyer:'浙江省直房地产服务有限公司（标题提取，需原文核验）',noticeType:'中标/成交结果公告',budget:'以公告原文为准',deadline:'已进入结果公告阶段',sourceName:'中国政府采购网',sourceUrl:'http://www.ccgp.gov.cn/cggg/dfgg/zbgg/202607/t20260710_26910042.htm',publishedAt:'2026-07-10T07:00:43.783Z',keywordsMatched:['展陈','提升工程','文化空间'],attentionLevel:'重点关注',attentionReason:'历史建筑/文化空间展陈提升，适合观察中标单位和服务范围。',summary:'真实公告线索，供应商和范围需进入原文核验。',status:'needs_verification'}
    ]};
    const $=s=>document.querySelector(s); let db=fallback, active='全部';
    const cats=['全部','博物馆','陈列布展','展陈设计','数字展厅','多媒体','文旅项目','城市更新','企业展厅','校史馆','纪念馆','规划馆','施工一体化'];
    function dateText(v){return v&&/^\d{4}/.test(v)?String(v).slice(0,10):'待核验'}
    function renderChips(){ $('#chips').innerHTML=cats.map(c=>`<button class="chipbtn ${c===active?'active':''}" data-cat="${c}">${c}</button>`).join(''); document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{active=b.dataset.cat; render();}); }
    function actionButtons(x){return `<button class="smallbtn" data-action="favorites" data-id="${x.id}">${ERPersonal.label('favorites',x.id,'已收藏','收藏')}</button><button class="smallbtn" data-action="later" data-id="${x.id}">${ERPersonal.label('later',x.id,'已加入','稍后看')}</button><button class="smallbtn" data-action="read" data-id="${x.id}">${ERPersonal.label('read',x.id,'已读','标已读')}</button><button class="smallbtn" data-action="hidden" data-id="${x.id}">隐藏</button>`}
    function leadCard(x){return `<article class="lead-card"><div><span class="badge bid">${x.category}</span><h3>${x.title}</h3><p>${x.summary||''}</p><div class="kv2"><b>地区</b><span>${x.region||'待核验'}</span><b>采购人</b><span>${x.buyer||'待核验'}</span><b>公告类型</b><span>${x.noticeType||'待核验'}</span><b>预算</b><span>${x.budget||'以公告原文为准'}</span><b>发布时间</b><span>${dateText(x.publishedAt)}</span><b>截止时间</b><span>${x.deadline||'以公告原文为准'}</span></div><div class="meta">${(x.keywordsMatched||[]).map(k=>`<span class="pill">${k}</span>`).join('')}<span class="pill">${x.status==='needs_verification'?'待原文核验':'已核验'}</span></div><div class="small-actions"><a class="smallbtn primary" href="${x.sourceUrl}" target="_blank" rel="noopener">查看原文 ↗</a>${actionButtons(x)}</div></div><aside class="attention"><b>${x.attentionLevel||'信息观察'}</b><p>${x.attentionReason||'进入原文核验预算、范围和资质。'}</p></aside></article>`}
    function sourceCard(s){return `<article class="source-card2"><h3>${s.name}</h3><p>${s.use}</p><a class="btn" href="${s.officialUrl}" target="_blank" rel="noopener">进入官网</a></article>`}
    function render(){renderChips(); const q=($('#q').value||'').trim().toLowerCase(); let out=(db.items||[]).filter(x=>!ERPersonal.has('hidden',x.id)); if(active!=='全部') out=out.filter(x=>x.category.includes(active)||JSON.stringify(x.keywordsMatched||[]).includes(active)); if(q) out=out.filter(x=>JSON.stringify(x).toLowerCase().includes(q)); out.sort((a,b)=>String(b.publishedAt||'').localeCompare(String(a.publishedAt||''))); $('#countText').textContent=`当前显示 ${out.length} / ${(db.items||[]).length} 条 · 最近核验 ${db.lastVerifiedAt||'2026-07-14'}`; $('#list').innerHTML=out.map(leadCard).join('')||'<div class="empty">没有匹配线索。</div>'; $('#keywords').innerHTML=(db.keywords||[]).map(k=>`<button class="chipbtn" data-keyword="${k}">${k}</button>`).join(''); $('#sources').innerHTML=(db.sources||[]).map(sourceCard).join(''); document.querySelectorAll('[data-keyword]').forEach(b=>b.onclick=()=>{$('#q').value=b.dataset.keyword; render();}); bindActions(); }
    function bindActions(){document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>{const item=(db.items||[]).find(x=>x.id===b.dataset.id); ERPersonal.toggle(b.dataset.action,item); render();});}
    $('#q').addEventListener('input',render); render();
    fetch(new URL('../data/bidding.json?v=20260714-real', document.baseURI)).then(r=>r.json()).then(json=>{db=json; $('#metaLine').textContent=`${json.items?.length||0}条真实公告线索 · ${json.sources?.length||0}个官方来源 · 最近核验 ${json.lastVerifiedAt}`; render();}).catch(()=>{$('#metaLine').textContent='已显示本地兜底线索；数据文件暂时未能同步。';});
  </script>
</body>
</html>
