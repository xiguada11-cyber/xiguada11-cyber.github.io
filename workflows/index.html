<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>方案工作流｜个人展陈项目助手</title>
  <meta name="description" content="展陈项目常用工作流：策展逻辑、大纲、标题文案、设计理念、空间阐释、汇报稿、概念图、效果图转视频。">
  <link rel="stylesheet" href="/assets/site.css?v=20260720-workflows">
  <style>
    :root{--paper:#f6f3ec;--ink:#18211d;--muted:#6f776f;--line:#ded8ca;--gold:#b99042;--green:#4d6b58}
    body{background:var(--paper);color:var(--ink)}.top{background:rgba(246,243,236,.94);backdrop-filter:blur(14px)}.navlinks a.active{color:var(--ink);font-weight:700}
    .page-hero{padding:34px 0 12px}.page-hero h1{font-size:clamp(38px,6vw,72px);line-height:1;margin:0}.page-hero p{font-size:17px;color:var(--muted);line-height:1.7;max-width:760px;margin:14px 0 0}
    .workflow-layout{display:grid;grid-template-columns:330px minmax(0,1fr);gap:16px;padding:18px 0 44px}.task-list{display:grid;gap:8px;align-content:start}.task-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:13px;text-align:left;cursor:pointer;color:var(--ink)}.task-btn.active{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink) inset}.task-btn strong{display:block;font-size:16px}.task-btn span{display:block;font-size:12px;color:var(--muted);margin-top:5px;line-height:1.45}
    .detail{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px}.detail h2{font-size:28px;margin:0 0 8px}.scenario{color:var(--muted);line-height:1.65;margin:0 0 16px}.cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}.panel{border:1px solid #ece6dc;border-radius:8px;padding:13px;background:#fffdf9}.panel h3{font-size:15px;margin:0 0 8px}.panel ol{margin:0;padding-left:18px}.panel li{margin:7px 0;line-height:1.55}.tool-row{display:flex;gap:8px;flex-wrap:wrap}.tool-pill{border:1px solid var(--line);border-radius:999px;background:#fff;padding:7px 10px;font-size:12px}.prompt-box{white-space:pre-wrap;border:1px solid var(--line);background:#18211d;color:#fff;border-radius:8px;padding:14px;line-height:1.7;font-size:13px;min-height:150px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.mini-btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 10px;font-size:12px;color:var(--ink);text-decoration:none;cursor:pointer}.mini-btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}details.custom{margin-top:14px;border:1px dashed var(--line);border-radius:8px;padding:12px;background:#fbfaf6}details.custom summary{cursor:pointer;font-weight:700}.related{display:flex;gap:8px;flex-wrap:wrap}.related a{color:var(--ink);font-size:12px;text-decoration:none;border-bottom:1px solid var(--ink)}
    @media(max-width:980px){.workflow-layout{grid-template-columns:1fr}.task-list{grid-template-columns:repeat(2,minmax(0,1fr))}.cols{grid-template-columns:1fr}}@media(max-width:650px){.task-list{grid-template-columns:1fr}.page-hero h1{font-size:40px}.navlinks{gap:10px}.navlinks a{font-size:12px}}
  </style>
</head>
<body>
<header class="top"><div class="shell nav"><a class="brand" href="/"><span class="mark">ER</span><span>个人展陈项目助手</span></a><nav class="navlinks"><a href="/">首页</a><a href="/references/">项目参考</a><a class="active" href="/workflows/">方案工作流</a><a href="/tools/">常用工具</a><a href="/reading/">值得看</a></nav></div></header>
<main>
  <section class="shell page-hero"><p class="eyebrow">PROPOSAL WORKFLOWS</p><h1>开始做方案</h1><p>八个高频任务直接进入。每个任务给场景、步骤、可复制提示词、推荐工具和相关案例，不要求先填一堆表单。</p></section>
  <section class="shell workflow-layout"><div id="taskList" class="task-list"></div><div id="detail" class="detail"></div></section>
</main>
<footer class="footer"><div class="shell">方案工作流 · 提示词用于起草和梳理，不替代事实核验与专业判断。</div></footer>
<script src="/assets/personal.js?v=20260720"></script>
<script>
const workflows = [
  {id:'curatorial-logic',title:'梳理策展逻辑',when:'资料很多但主线不清楚',scenario:'拿到业主资料、历史资料、政策文件或场地条件后，先把主题、对象、章节和参观路径梳理出来。',tools:['NotebookLM','ChatGPT','Claude'],cases:['奉贤城市博物馆','天津机床工业博物馆'],steps:['把原始资料按历史、人物、空间、产业、政策分组','提炼项目必须回应的核心问题','把故事线拆成总主题、分主题、章节和重点展项','标出仍需向甲方核验的信息'],prompt:'你是展陈策划总监。请基于以下资料，为[项目名称]梳理策展逻辑：\n1. 项目要回答的核心问题；\n2. 目标观众和参观情绪；\n3. 总主题与3-5条分主题；\n4. 每条分主题对应的空间章节、关键展项和可视化表达；\n5. 需要向甲方继续确认的信息。\n所有不确定内容标注为“待核验”。'},
  {id:'outline',title:'编写展陈大纲',when:'需要形成可汇报的章节框架',scenario:'从策展逻辑进入正式大纲，生成展区结构、内容要点、展项建议和动线顺序。',tools:['ChatGPT','Claude','PowerPoint'],cases:['中国共产党历史展览馆','建筑模型博物馆'],steps:['确定总主题和章节数量','给每个展区写一句核心叙事','列出重点展品、图文、多媒体和互动建议','整理成可放入PPT的层级结构'],prompt:'请为[项目名称]生成展陈大纲：\n- 总主题与副标题\n- 3-5个展区名称\n- 每个展区的核心叙事、重点内容、展项形式、空间氛围\n- 序厅、尾厅和重点节点建议\n- 需要补充的资料清单\n要求：标题克制，逻辑清晰，不编造事实。'},
  {id:'title-copy',title:'优化标题文案',when:'章节名和展板标题太平',scenario:'把普通章节标题改成更有节奏、更适合展板和汇报的表达，同时避免空泛口号。',tools:['ChatGPT','Claude','PowerPoint'],cases:['奉贤城市博物馆','三体大型沉浸式艺术展'],steps:['先确认标题承担的功能：解释、引导、情绪或记忆点','把长句压缩成可上墙的短句','为同一章节生成庄重、诗性、科技、公众四种语气','最终统一全案标题长度和节奏'],prompt:'请优化以下展陈标题文案。\n项目类型：[博物馆/企业展厅/文旅空间/纪念馆]\n整体气质：[庄重/温暖/科技/诗性]\n原标题列表：[粘贴标题]\n请输出：1. 更适合上墙的标题；2. 15字以内副标题；3. 为什么这样改；4. 不建议使用的空泛表达。'},
  {id:'design-concept',title:'编写设计理念',when:'方案需要一句能讲清方向的话',scenario:'把策展、空间、视觉和技术整合成设计理念，用于封面、方案总述或汇报开场。',tools:['ChatGPT','Claude'],cases:['AH SPACE','丝路视觉数字孪生业务入口'],steps:['先列出项目目标、场地特征、内容主线和观众感受','找到一个能连接内容与空间的设计动作','用一段短文解释“为什么这样设计”','再压缩成一句主张和三条支撑'],prompt:'请为[项目名称]编写设计理念。\n已知信息：项目背景、主题、空间条件、目标观众、希望营造的体验。\n请输出：\n1. 一句话设计主张；\n2. 120字以内设计理念；\n3. 三条设计策略；\n4. 对应的空间或展项表达；\n要求：避免“科技赋能、沉浸体验、创新融合”等空话。'},
  {id:'space-writing',title:'编写空间阐释',when:'效果图需要配说明',scenario:'为序厅、主展厅、互动区、尾厅等空间写清楚设计目的、内容承载和体验节奏。',tools:['ChatGPT','Photoshop','PowerPoint'],cases:['建筑模型博物馆','台州城市大脑运营中心'],steps:['说明空间承担的叙事功能','指出材料、灯光、展品和屏幕服务什么信息','写出观众进入、停留、转场的感受','控制每段在80-120字'],prompt:'请为以下展陈空间编写阐释文案：\n空间名称：[名称]\n展区主题：[主题]\n画面/设计描述：[粘贴描述]\n需要强调：[内容/材料/灯光/多媒体/动线]\n请输出80-120字，说明它在整条展线中的作用，并避免堆形容词。'},
  {id:'deck',title:'制作汇报稿',when:'要把资料变成甲方能听懂的方案',scenario:'把研究、策略、案例、概念图和实施路径整理成可以讲的PPT结构。',tools:['ChatGPT','PowerPoint','Figma','Napkin AI'],cases:['奉贤城市博物馆','凡拓数创规划馆'],steps:['先确定汇报对象和会议目的','用15页以内结构讲清项目理解、策略和落地路径','把复杂逻辑转成图示，而不是堆文字','每页只保留一个核心判断'],prompt:'请把以下内容整理成15页以内展陈项目汇报稿：\n1. 项目理解；2. 目标人群；3. 策展主题；4. 空间策略；5. 展区规划；6. 重点展项；7. 技术路线；8. 案例对标；9. 实施计划；10. 风险与下一步。\n每页输出标题、核心句、推荐图示和需要补充的素材。'},
  {id:'concept-image',title:'生成展厅概念图',when:'需要快速表达空间气质',scenario:'早期用概念图探索材料、光线、尺度、展项关系和视觉氛围。',tools:['即梦AI','ChatGPT','Photoshop'],cases:['AH SPACE','三体大型沉浸式艺术展'],steps:['先写清空间主题、尺度、材料、光线和核心展项','生成3-5种方向，不只追求好看','用Photoshop修正结构和品牌视觉','标注为概念参考，不当施工效果图'],prompt:'生成一个[主题]展厅概念图：空间尺度[大/中/小]，材质[材质]，光线[光线]，展陈语言[关键词]，包含[核心展项]，整体气质[庄重/科技/温暖/未来]，真实空间摄影感，避免文字水印和夸张装饰。'},
  {id:'image-video',title:'把效果图变成视频',when:'需要汇报短片或动态演示',scenario:'把效果图、概念图或分镜画面转成空间推进、环绕或重点展项演示片。',tools:['Vidu','可灵AI','Runway','剪映'],cases:['teamLab Biovortex Kyoto','Runway Gen-4.5'],steps:['选3-6张结构稳定的画面并统一比例','分别测试推进、环绕、慢移三种镜头','检查画面是否改变空间结构和展项位置','用剪映加标题、旁白、字幕并导出汇报版'],prompt:'将这张展厅效果图转换为6秒视频：镜头缓慢向前推进，保持空间结构稳定，灯光轻微变化，观众视角自然移动，不改变展厅布局，不添加无关人物，不出现文字变形。'}
];
let active = workflows[0].id;
function renderList(){document.getElementById('taskList').innerHTML = workflows.map((item, index) => `<button class="task-btn ${item.id===active?'active':''}" data-id="${item.id}"><strong>${String(index+1).padStart(2,'0')} ${item.title}</strong><span>${item.when}</span></button>`).join(''); document.querySelectorAll('[data-id]').forEach((button)=>button.onclick=()=>{active=button.dataset.id; render();});}
function renderDetail(){const item = workflows.find((entry)=>entry.id===active); document.getElementById('detail').innerHTML = `<h2>${item.title}</h2><p class="scenario">${item.scenario}</p><div class="cols"><div class="panel"><h3>操作步骤</h3><ol>${item.steps.map((step)=>`<li>${step}</li>`).join('')}</ol></div><div class="panel"><h3>推荐工具</h3><div class="tool-row">${item.tools.map((tool)=>`<span class="tool-pill">${tool}</span>`).join('')}</div><h3 style="margin-top:16px">相关案例</h3><div class="related">${item.cases.map((name)=>`<a href="/references/">${name}</a>`).join('')}</div></div></div><h3 style="margin:18px 0 8px">可复制提示词</h3><div class="prompt-box" id="promptText">${item.prompt}</div><div class="actions"><button class="mini-btn primary" id="copyPrompt">复制提示词</button><button class="mini-btn" id="saveWorkflow">加入最近使用</button></div><details class="custom"><summary>根据当前项目定制</summary><p style="color:var(--muted);line-height:1.7;margin:10px 0 0">复制提示词后，只需要替换项目名称、项目类型、地点、目标观众、已有资料和你当前卡住的问题。不要一次塞太多目标，先让 AI 完成一个清晰步骤。</p></details>`; document.getElementById('copyPrompt').onclick = async () => { await navigator.clipboard.writeText(item.prompt); document.getElementById('copyPrompt').textContent='已复制'; ERPersonal.remember({id:item.id,title:item.title,url:'/workflows/#'+item.id,contentType:'工作流'}); }; document.getElementById('saveWorkflow').onclick = () => { ERPersonal.remember({id:item.id,title:item.title,url:'/workflows/#'+item.id,contentType:'工作流'}); document.getElementById('saveWorkflow').textContent='已加入'; };}
function render(){renderList(); renderDetail(); history.replaceState(null,'','#'+active)}
const hash = location.hash.replace('#',''); if(workflows.some((item)=>item.id===hash)) active = hash; render();
</script>
</body>
</html>
