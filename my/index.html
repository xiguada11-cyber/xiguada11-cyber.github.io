<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>我的阅读｜EXHIBITION RADAR</title>
  <link rel="stylesheet" href="/assets/site.css?v=20260714-my">
  <style>.my-hero{padding:34px 0 18px}.my-hero h1{font-size:clamp(36px,5vw,64px);margin:0 0 10px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;font-size:13px;color:var(--muted);cursor:pointer}.tab.active{background:var(--ink);border-color:var(--ink);color:#fff}.saved-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.saved-card{border:1px solid var(--line);background:#fff;border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:8px;min-height:150px}.saved-card h3{font-size:17px;margin:0}.saved-card p{font-size:13px;color:var(--muted);margin:0}.empty{border:1px solid var(--line);background:#fff;border-radius:8px;padding:18px;color:var(--muted)}@media(max-width:900px){.saved-grid{grid-template-columns:1fr}}</style>
</head>
<body>
<header class="top"><div class="shell nav"><a class="brand" href="/"><span class="mark">ER</span><span>EXHIBITION RADAR</span></a><nav class="navlinks"><a href="/intelligence/">行业情报</a><a href="/bidding/">招投标雷达</a><a href="/cases/">案例研究</a><a href="/resources/">灵感与AI工具</a><a class="active" href="/my/">我的</a><a href="/settings/">设置</a></nav></div></header>
<main><section class="shell my-hero"><p class="eyebrow">LOCAL PERSONAL LIBRARY</p><h1>我的阅读</h1><p style="color:var(--muted);max-width:760px">不需要登录，收藏、稍后阅读、已读和隐藏都保存在当前浏览器 localStorage。</p><div class="tabs"><button class="tab active" data-tab="favorites">收藏</button><button class="tab" data-tab="later">稍后阅读</button><button class="tab" data-tab="read">已读</button><button class="tab" data-tab="hidden">隐藏</button></div></section><section class="shell section"><div id="list" class="saved-grid"></div></section></main>
<footer class="footer"><div class="shell">EXHIBITION RADAR · 我的本地阅读状态</div></footer>
<script src="/assets/personal.js?v=20260714"></script>
<script>
const $=s=>document.querySelector(s); let tab='favorites';
function render(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab)); const items=ERPersonal.all(tab); $('#list').innerHTML=items.length?items.map(x=>`<article class="saved-card"><span class="badge">${x.type||tab}</span><h3>${x.title}</h3><p>保存时间：${String(x.savedAt||'').slice(0,10)}</p><div class="actions"><a class="btn primary" href="${x.url}" target="_blank" rel="noopener">打开来源</a><button class="btn" data-remove="${x.id}">移除</button></div></article>`).join(''):'<div class="empty">这里还没有内容。去行业情报或招投标页面点“收藏 / 稍后读”。</div>'; document.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{const s=ERPersonal.load(); delete s[tab][b.dataset.remove]; ERPersonal.save(s); render();});}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();}); render();
</script>
</body></html>
