<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>我的收藏｜个人展陈项目助手</title>
  <link rel="stylesheet" href="/assets/site.css?v=20260720-my">
  <style>
    :root{--paper:#f6f3ec;--ink:#18211d;--muted:#6f776f;--line:#ded8ca;--gold:#b99042}
    body{background:var(--paper);color:var(--ink)}.top{background:rgba(246,243,236,.94);backdrop-filter:blur(14px)}.my-hero{padding:34px 0 18px}.my-hero h1{font-size:clamp(36px,5vw,64px);margin:0 0 10px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;font-size:13px;color:var(--muted);cursor:pointer}.tab.active{background:var(--ink);border-color:var(--ink);color:#fff}.saved-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.saved-card{border:1px solid var(--line);background:#fff;border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:8px;min-height:150px}.saved-card h3{font-size:17px;margin:0}.saved-card p{font-size:13px;color:var(--muted);margin:0}.empty{border:1px solid var(--line);background:#fff;border-radius:8px;padding:18px;color:var(--muted)}.mini-btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 10px;font-size:12px;color:var(--ink);text-decoration:none;cursor:pointer}.mini-btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto}@media(max-width:900px){.saved-grid{grid-template-columns:1fr}.navlinks{gap:10px}.navlinks a{font-size:12px}}
  </style>
</head>
<body>
<header class="top"><div class="shell nav"><a class="brand" href="/"><span class="mark">ER</span><span>个人展陈项目助手</span></a><nav class="navlinks"><a href="/">首页</a><a href="/references/">项目参考</a><a href="/workflows/">方案工作流</a><a href="/tools/">常用工具</a><a href="/reading/">值得看</a></nav></div></header>
<main>
  <section class="shell my-hero">
    <p class="eyebrow">LOCAL PERSONAL LIBRARY</p>
    <h1>我的收藏</h1>
    <p style="color:var(--muted);max-width:760px;line-height:1.7">不需要登录。收藏、稍后阅读、已读、隐藏和最近使用都保存在当前浏览器。</p>
    <div class="tabs"><button class="tab active" data-tab="favorites">收藏</button><button class="tab" data-tab="later">稍后阅读</button><button class="tab" data-tab="read">已读</button><button class="tab" data-tab="hidden">隐藏</button><button class="tab" data-tab="recent">最近使用</button></div>
  </section>
  <section class="shell section"><div id="list" class="saved-grid"></div></section>
</main>
<footer class="footer"><div class="shell">我的收藏 · 本地浏览器状态</div></footer>
<script src="/assets/personal.js?v=20260720"></script>
<script>
const $=s=>document.querySelector(s); let tab='favorites';
function label(){return {favorites:'收藏',later:'稍后阅读',read:'已读',hidden:'隐藏',recent:'最近使用'}[tab] || tab}
function render(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab)); const items=ERPersonal.all(tab); $('#list').innerHTML=items.length?items.map(x=>`<article class="saved-card"><span class="badge">${x.type||label()}</span><h3>${x.title}</h3><p>${label()}：${String(x.savedAt||'').slice(0,10)}</p><div class="actions"><a class="mini-btn primary" href="${x.url}" target="_blank" rel="noopener">打开来源</a><button class="mini-btn" data-remove="${x.id}">移除</button></div></article>`).join(''):`<div class="empty">这里还没有${label()}内容。去首页入口、项目参考、常用工具或值得看页面操作后会自动出现。</div>`; document.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{ERPersonal.remove(tab,b.dataset.remove); render();});}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();}); render();
</script>
</body></html>
