name: Refresh Exhibition Data Status

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate and refresh data status
        run: node scripts/refresh-data.mjs
      - name: Commit refreshed status
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update data refresh status
          file_pattern: data/update-status.json
