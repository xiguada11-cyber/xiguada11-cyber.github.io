name: Refresh Exhibition Reading Data

on:
  schedule:
    # Beijing 08:00 / 12:00 / 16:00 / 18:00 / 20:00
    # UTC     00:00 / 04:00 / 08:00 / 10:00 / 12:00
    - cron: '0 0,4,8,10,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Refresh curated reading data and status
        run: node scripts/refresh-data.mjs
      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update curated reading data
          file_pattern: data/reading-candidates.json data/reading-selected.json data/update-status.json
