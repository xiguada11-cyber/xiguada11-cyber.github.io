<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>今天要推进什么？｜个人展陈项目助手</title>
  <meta name="description" content="个人展陈项目助手：找参考、做方案、开工具，再看看本周真正值得关注的行业内容。">
  <link rel="stylesheet" href="/assets/site.css?v=20260720-personal-workbench">
  <style>
    :root{--paper:#f6f3ec;--ink:#18211d;--muted:#6f776f;--line:#ded8ca;--gold:#b99042;--green:#4d6b58;--red:#8c4a3d}
    body{background:var(--paper);color:var(--ink)}
    .top{background:rgba(246,243,236,.94);backdrop-filter:blur(14px)}
    .navlinks a.active{color:var(--ink);font-weight:700}
    .home-hero{padding:34px 0 18px}
    .hero-panel{display:grid;grid-template-columns:minmax(280px,.9fr) minmax(320px,1.1fr);gap:24px;align-items:end}
    .hero-copy h1{font-size:clamp(42px,7vw,86px);line-height:.98;margin:0;letter-spacing:0;max-width:720px}
    .hero-copy p{font-size:18px;line-height:1.7;color:var(--muted);max-width:640px;margin:18px 0 0}
    .entry-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:22px}
    .entry{position:relative;min-height:260px;border-radius:8px;overflow:hidden;border:1px solid rgba(24,33,29,.18);background:#111;display:flex;align-items:flex-end;text-decoration:none;color:#fff}
    .entry img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(.72) contrast(.98);transition:transform .45s ease}
    .entry:hover img{transform:scale(1.04)}
    .entry:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05) 18%,rgba(0,0,0,.72) 100%)}
    .entry-body{position:relative;z-index:2;padding:18px;display:flex;flex-direction:column;gap:8px}
    .entry-num{font-size:12px;letter-spacing:0;color:rgba(255,255,255,.72)}
    .entry h2{font-size:24px;line-height:1.15;margin:0;color:#fff}
    .entry p{font-size:13px;line-height:1.55;margin:0;color:rgba(255,255,255,.78)}
    .section{padding:24px 0}.section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:12px}.section-head h2{font-size:24px;margin:0}.section-head p{font-size:13px;color:var(--muted);margin:6px 0 0}.plain-link{font-size:13px;color:var(--ink);text-decoration:none;border-bottom:1px solid var(--ink)}
    .reading-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}.read-card{border:1px solid var(--line);background:#fff;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px;min-height:190px}.read-card h3{font-size:16px;line-height:1.28;margin:0}.read-card p{font-size:12px;color:var(--muted);line-height:1.5;margin:0}.read-card .reason{color:var(--ink);border-left:3px solid var(--gold);padding-left:8px}.card-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:auto}.mini-btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:7px 9px;font-size:12px;color:var(--ink);text-decoration:none;cursor:pointer}.mini-btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}
    .recent-wrap{display:grid;grid-template-columns:minmax(0,.8fr) minmax(0,1.2fr);gap:12px}.recent-box{border:1px solid var(--line);background:#fff;border-radius:8px;padding:14px;min-height:132px}.recent-list{display:grid;gap:8px}.recent-item{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #eee8dc;padding:8px 0}.recent-item:last-child{border-bottom:0}.recent-item a{color:var(--ink);font-weight:700;text-decoration:none}.recent-item span{font-size:12px;color:var(--muted)}.empty{color:var(--muted);font-size:13px;line-height:1.7;margin:0}.quiet-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    @media(max-width:1080px){.hero-panel{grid-template-columns:1fr}.reading-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.recent-wrap{grid-template-columns:1fr}}
    @media(max-width:760px){.home-hero{padding-top:22px}.entry-grid,.reading-grid{grid-template-columns:1fr}.entry{min-height:210px}.hero-copy h1{font-size:40px}.hero-copy p{font-size:16px}.section-head{display:block}.navlinks{gap:10px}.navlinks a{font-size:12px}}
  </style>
</head>
<body>
  <header class="top">
    <div class="shell nav">
      <a class="brand" href="/"><span class="mark">ER</span><span>个人展陈项目助手</span></a>
      <nav class="navlinks">
        <a class="active" href="/">首页</a>
        <a href="/references/">项目参考</a>
        <a href="/workflows/">方案工作流</a>
        <a href="/tools/">常用工具</a>
        <a href="/reading/">值得看</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="shell home-hero">
      <div class="hero-panel">
        <div class="hero-copy">
          <p class="eyebrow">PERSONAL EXHIBITION WORKBENCH</p>
          <h1>今天要推进什么？</h1>
          <p>找参考、做方案、开工具，再看看行业里真正值得关注的变化。</p>
        </div>
        <div class="recent-box" id="recentBox">
          <h2 style="font-size:20px;margin:0 0 8px">最近使用</h2>
          <div id="recentList" class="recent-list"></div>
          <div class="quiet-actions"><a class="mini-btn" href="/my/">查看我的收藏</a></div>
        </div>
      </div>
      <div class="entry-grid" aria-label="三个核心工作入口">
        <a class="entry" href="/references/" data-entry="项目参考">
          <img src="https://images.unsplash.com/photo-1545987796-200677ee1011?auto=format&fit=crop&w=1200&q=76" alt="博物馆展览空间">
          <div class="entry-body"><span class="entry-num">01</span><h2>找项目参考</h2><p>按项目类型看可借鉴案例，不进入公司资产库。</p></div>
        </a>
        <a class="entry" href="/workflows/" data-entry="方案工作流">
          <img src="https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=1200&q=76" alt="设计工作台">
          <div class="entry-body"><span class="entry-num">02</span><h2>开始做方案</h2><p>策展逻辑、文案、汇报稿、概念图和视频流程。</p></div>
        </a>
        <a class="entry" href="/tools/" data-entry="常用工具">
          <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1200&q=76" alt="数字创作界面">
          <div class="entry-body"><span class="entry-num">03</span><h2>打开常用工具</h2><p>只保留高频工具，少点一次，快进入工作。</p></div>
        </a>
      </div>
    </section>

    <section class="shell section">
      <div class="section-head">
        <div><h2>本周值得看</h2><p>最多 5 条，只保留能帮你做项目、判断方向或获得灵感的内容。</p></div>
        <a class="plain-link" href="/reading/">查看全部精选 →</a>
      </div>
      <div id="weeklyGrid" class="reading-grid"></div>
    </section>
  </main>

  <footer class="footer"><div class="shell">个人展陈项目助手 · 本地状态保存在当前浏览器 · <a href="/my/">我的收藏</a></div></footer>
  <script src="/assets/personal.js?v=20260720"></script>
  <script>
    const fallbackReading = [
      {id:'fallback-teamlab',contentType:'全球新展',title:'teamLab Biovortex Kyoto',sourceName:'teamLab',sourceUrl:'https://www.teamlab.art/e/biovortex-kyoto/',summary:'京都常设数字艺术项目，适合看沉浸式动线。',whyItMatters:'适合拆解沉浸式展览的停留点与参与机制。'},
      {id:'fallback-dezeen',contentType:'行业文章',title:'Exhibitions are becoming multimedia and interactive driven',sourceName:'Dezeen',sourceUrl:'https://www.dezeen.com/2026/02/04/exhibitions-multimedia-interactive-bewunder/',summary:'展览转向多媒体与互动驱动。',whyItMatters:'适合判断技术是否真的服务叙事。'}
    ];
    const $ = (selector) => document.querySelector(selector);
    function dateText(value){return value && /^\d{4}/.test(value) ? String(value).slice(0,10) : '持续更新'}
    function renderRecent(){
      const recent = [...ERPersonal.all('recent'), ...ERPersonal.all('favorites'), ...ERPersonal.all('later')]
        .filter((item, index, arr) => arr.findIndex((x) => x.id === item.id) === index)
        .slice(0, 4);
      $('#recentList').innerHTML = recent.length ? recent.map((item) => `<div class="recent-item"><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a><span>${item.type || '记录'} · ${String(item.savedAt || '').slice(0,10)}</span></div>`).join('') : '<p class="empty">还没有记录。打开一个工具、收藏一条精选或进入一个工作流后，这里会自动出现。</p>';
    }
    function renderReading(items){
      const visible = items.filter((item) => !ERPersonal.has('hidden', item.id)).slice(0, 5);
      $('#weeklyGrid').innerHTML = visible.map((item) => `<article class="read-card"><span class="badge">${item.contentType}</span><h3>${item.title}</h3><p>${item.sourceName} · ${dateText(item.publishedAt)}</p><p>${item.summary || ''}</p><p class="reason">${item.whyItMatters || ''}</p><div class="card-actions"><a class="mini-btn primary" href="${item.sourceUrl}" target="_blank" rel="noopener" data-open="${item.id}">原文 ↗</a><button class="mini-btn" data-action="favorites" data-id="${item.id}">${ERPersonal.label('favorites', item.id, '已收藏', '收藏')}</button><button class="mini-btn" data-action="later" data-id="${item.id}">${ERPersonal.label('later', item.id, '已加入', '稍后读')}</button></div></article>`).join('');
      document.querySelectorAll('[data-action]').forEach((button) => button.onclick = () => { const item = items.find((entry) => entry.id === button.dataset.id); ERPersonal.toggle(button.dataset.action, item); renderRecent(); renderReading(items); });
      document.querySelectorAll('[data-open]').forEach((link) => link.onclick = () => { const item = items.find((entry) => entry.id === link.dataset.open); ERPersonal.remember(item); renderRecent(); });
    }
    document.querySelectorAll('[data-entry]').forEach((entry) => entry.addEventListener('click', () => ERPersonal.remember({id:'entry-' + entry.dataset.entry, title:entry.dataset.entry, url:entry.href, contentType:'工作入口'})));
    renderRecent();
    fetch('/data/reading-selected.json?v=20260720').then((res) => res.json()).then((data) => renderReading(data.items || fallbackReading)).catch(() => renderReading(fallbackReading));
  </script>
</body>
</html>
