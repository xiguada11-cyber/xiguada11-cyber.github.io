<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>项目参考｜个人展陈项目助手</title>
  <meta name="description" content="按博物馆、工业文化、企业展厅、城市更新、数字展览等类型查看展陈行业优秀案例。">
  <link rel="stylesheet" href="/assets/site.css?v=20260720-references">
  <style>
    :root{--paper:#f6f3ec;--ink:#18211d;--muted:#6f776f;--line:#ded8ca;--gold:#b99042;--green:#4d6b58}
    body{background:var(--paper);color:var(--ink)}.top{background:rgba(246,243,236,.94);backdrop-filter:blur(14px)}.navlinks a.active{color:var(--ink);font-weight:700}
    .page-hero{padding:34px 0 18px}.page-hero h1{font-size:clamp(38px,6vw,72px);line-height:1;margin:0}.page-hero p{font-size:17px;color:var(--muted);max-width:740px;line-height:1.7;margin:14px 0 0}
    .type-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px}.type-chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-size:13px;color:var(--ink);cursor:pointer}.type-chip.active{background:var(--ink);border-color:var(--ink);color:#fff}
    .case-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;padding:20px 0 42px}.case-card{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;min-height:500px}.case-img{height:190px;background:#1d2521}.case-img img{width:100%;height:100%;object-fit:cover;filter:saturate(.78)}.case-body{padding:14px;display:flex;flex-direction:column;gap:9px;flex:1}.case-body h2{font-size:20px;line-height:1.25;margin:0}.meta{font-size:12px;color:var(--muted);line-height:1.55}.highlight{font-size:13px;line-height:1.65;color:var(--ink);margin:0}.lesson{border-left:3px solid var(--gold);padding:9px 0 9px 10px;background:#fbfaf6;font-size:13px;line-height:1.65;color:var(--ink)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto}.mini-btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 10px;font-size:12px;color:var(--ink);text-decoration:none;cursor:pointer}.mini-btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}details.case-note{font-size:12px;color:var(--muted);line-height:1.65}details.case-note summary{cursor:pointer;color:var(--ink);font-weight:700;margin-bottom:6px}.empty{grid-column:1/-1;border:1px solid var(--line);background:#fff;border-radius:8px;padding:18px;color:var(--muted)}
    @media(max-width:1080px){.case-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:700px){.case-grid{grid-template-columns:1fr}.page-hero h1{font-size:40px}.case-card{min-height:auto}.navlinks{gap:10px}.navlinks a{font-size:12px}}
  </style>
</head>
<body>
<header class="top"><div class="shell nav"><a class="brand" href="/"><span class="mark">ER</span><span>个人展陈项目助手</span></a><nav class="navlinks"><a href="/">首页</a><a class="active" href="/references/">项目参考</a><a href="/workflows/">方案工作流</a><a href="/tools/">常用工具</a><a href="/reading/">值得看</a></nav></div></header>
<main>
  <section class="shell page-hero">
    <p class="eyebrow">PROJECT REFERENCES</p>
    <h1>找项目参考</h1>
    <p>先选项目类型，再看可借鉴的行业案例。这里只保留能帮助你判断策划、空间、展项或技术表达的案例，不展示公司内部资产。</p>
    <div id="typeBar" class="type-bar"></div>
  </section>
  <section class="shell"><div id="caseGrid" class="case-grid"></div></section>
</main>
<footer class="footer"><div class="shell">项目参考 · 以官方来源为入口，具体年份、面积、预算以原文为准。</div></footer>
<script src="/assets/personal.js?v=20260720"></script>
<script>
const TYPES = ['博物馆','工业文化','企业展厅','文旅景区','文保更新','城市更新','数字展览','临时展览','文化空间','沉浸式体验'];
const covers = {
  '博物馆':'https://images.unsplash.com/photo-1545987796-200677ee1011?auto=format&fit=crop&w=1000&q=76',
  '工业文化':'https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=1000&q=76',
  '企业展厅':'https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1000&q=76',
  '文旅景区':'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1000&q=76',
  '文保更新':'https://images.unsplash.com/photo-1566127992631-137a642a90f4?auto=format&fit=crop&w=1000&q=76',
  '城市更新':'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1f?auto=format&fit=crop&w=1000&q=76',
  '数字展览':'https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1000&q=76',
  '临时展览':'https://images.unsplash.com/photo-1527529482837-4698179dc6ce?auto=format&fit=crop&w=1000&q=76',
  '文化空间':'https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=1000&q=76',
  '沉浸式体验':'https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&w=1000&q=76'
};
const fallback = {items:[
  {id:'fallback-fengxian',title:'奉贤城市博物馆',companyName:'风语筑',location:'上海',projectType:'博物馆',summary:'城市文化与地方叙事类项目，适合研究城市记忆和互动展示的结合。',sourceName:'风语筑官网',sourceUrl:'https://www.fengyuzhu.com/?space',capabilities:['内容策划','空间设计','多媒体集成']},
  {id:'fallback-tianjin',title:'天津机床工业博物馆',companyName:'金螳螂文化',location:'天津',projectType:'博物馆',summary:'工业遗产与制造业主题展示线索，适合研究实物展品、工业叙事和场景表达。',sourceName:'金螳螂文化官网',sourceUrl:'https://www.jtlculture.com/case/3',capabilities:['工业叙事','实物展品','空间设计']}
]};
let active = '博物馆';
let data = [];
function typeOf(item){
  const text = [item.title,item.projectType,item.summary,(item.capabilities||[]).join(' ')].join(' ');
  if(/三体|沉浸|AH SPACE|数字艺术/.test(text)) return '沉浸式体验';
  if(/机床|工业|遗产/.test(text)) return '工业文化';
  if(/企业|品牌/.test(text)) return '企业展厅';
  if(/文旅|景区/.test(text)) return '文旅景区';
  if(/文保|更新|旧/.test(text)) return '文保更新';
  if(/城市|规划|大脑|运营中心/.test(text)) return '城市更新';
  if(/数字|AI|孪生|多媒体|互动/.test(text)) return '数字展览';
  if(/临时|大型.*展|艺术展/.test(text)) return '临时展览';
  if(/文化空间|空间/.test(text)) return '文化空间';
  return '博物馆';
}
function lessonFor(item,type){
  const text = item.title + ' ' + item.summary;
  if(type === '工业文化') return '适合参考工业遗存、机器实物与新材料之间的对比处理。';
  if(type === '城市更新') return '适合参考城市时间线、空间线和公共记忆如何组织成参观路径。';
  if(type === '企业展厅') return '适合参考企业战略、产品、技术与品牌形象之间的信息层级。';
  if(type === '数字展览') return '适合参考数字影像如何嵌入叙事，而不是只作为屏幕装饰。';
  if(type === '沉浸式体验') return '适合参考世界观、拍照点、叙事点和人流组织之间的平衡。';
  if(type === '文化空间') return '适合参考有限空间中章节、停留点和图文密度的组织。';
  if(/模型/.test(text)) return '适合参考模型、灯光、说明文字和观看尺度之间的关系。';
  return '适合参考入口空间如何完成情绪预热，以及展线如何从主题进入细节。';
}
function isProject(item){return !/入口|案例集合|业务入口|分类/.test(item.title + item.projectType)}
function renderTypes(){document.getElementById('typeBar').innerHTML = TYPES.map((type) => `<button class="type-chip ${type===active?'active':''}" data-type="${type}">${type}</button>`).join(''); document.querySelectorAll('[data-type]').forEach((button)=>button.onclick=()=>{active=button.dataset.type;render();});}
function card(item){const type=typeOf(item);return `<article class="case-card"><div class="case-img"><img src="${covers[type]}" alt="${item.title}"></div><div class="case-body"><span class="badge">${type}</span><h2>${item.title}</h2><div class="meta">${item.location||'地点待核验'} · ${item.projectType||type}<br>${item.companyName||'设计/策展机构待核验'}</div><p class="highlight">${item.summary||'官方案例线索，适合进入原文继续核验。'}</p><div class="lesson"><b>值得借鉴：</b>${lessonFor(item,type)}</div><details class="case-note"><summary>查看案例整理</summary><div>${(item.highlights||[]).slice(0,3).map((x)=>`<p>${x}</p>`).join('') || '<p>进入官方来源后，重点核验项目图片、服务范围和可参考展项。</p>'}</div></details><div class="actions"><a class="mini-btn primary" href="${item.sourceUrl}" target="_blank" rel="noopener" data-open="${item.id}">查看官方来源 ↗</a><button class="mini-btn" data-action="favorites" data-id="${item.id}">${ERPersonal.label('favorites', item.id, '已收藏', '收藏')}</button></div></div></article>`}
function render(){renderTypes(); const filtered=data.filter(isProject).filter((item)=>typeOf(item)===active); document.getElementById('caseGrid').innerHTML = filtered.length ? filtered.map(card).join('') : '<div class="empty">这个类型暂时没有足够可靠的案例。先看其他类型，后续候选池会继续补充。</div>'; document.querySelectorAll('[data-action]').forEach((button)=>button.onclick=()=>{const item=data.find((entry)=>entry.id===button.dataset.id); ERPersonal.toggle(button.dataset.action,item); render();}); document.querySelectorAll('[data-open]').forEach((link)=>link.onclick=()=>{const item=data.find((entry)=>entry.id===link.dataset.open); ERPersonal.remember(item);});}
fetch('/data/cases.json?v=20260720').then((res)=>res.json()).then((json)=>{data=json.items||fallback.items; render();}).catch(()=>{data=fallback.items; render();});
</script>
</body>
</html>
